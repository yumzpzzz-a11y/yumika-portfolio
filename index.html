<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YUMIKA — Visual Artist / Experience Designer</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ── 基本リセット ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#ffffff; --bg2:#f5f5f3; --ink:#111110; --mid:#888884;
  --faint:#c8c8c4; --line:transparent; --acc:#0528F2;
  --acc-light:rgba(5,40,242,.08); --dur:0.65s; --ease:cubic-bezier(0.76,0,0.24,1);
}
html{font-size:16px;}
body{
  font-family:'Helvetica Neue',Helvetica,'M PLUS 1p',sans-serif;
  background:var(--bg); color:var(--ink); font-weight:300;
  -webkit-font-smoothing:antialiased; cursor:none; overflow:hidden; height:100vh;
}

/* ── CURSOR 復活版 ── */
#cur{
  width:16px; height:16px;
  position:fixed; top:0; left:0; pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%); transition:opacity .2s;
  display: flex; align-items: center; justify-content: center;
}
#cur svg{
  width:16px; height:16px;
  fill:var(--ink); transition:transform .3s cubic-bezier(.34,1.56,.64,1), fill .25s;
  animation:starSpin 8s linear infinite;
}
@keyframes starSpin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
#ring{
  width:28px; height:28px; border:.5px solid rgba(17,17,16,.18); border-radius:50%;
  position:fixed; top:0; left:0; pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%); transition:width .2s,height .2s,border-color .2s;
}
body.ch #cur svg{ animation:starSpinFast .6s linear infinite; fill:var(--acc); transform:scale(1.25); }
@keyframes starSpinFast{ from{transform:rotate(0deg) scale(1.25);} to{transform:rotate(360deg) scale(1.25);} }
body.ch #ring{width:36px; height:36px; border-color:rgba(5,40,242,.25);}

/* ── HEADER ── */
header{
  position:fixed; top:0; left:0; right:0; z-index:200;
  background:var(--bg);
  display:flex; align-items:center;
  padding:0 2.5rem; height:52px;
}
.logo{
  font-family:'Helvetica Neue',Helvetica,sans-serif;
  font-size:.65rem; letter-spacing:.28em; text-transform:uppercase;
  color:var(--ink); text-decoration:none; cursor:none; font-weight:700;
  flex-shrink: 0;
}
nav{
  display:flex; gap:2.2rem; align-items:center;
  margin-left:auto; /* 右寄せ */
}
nav a{
  font-size:.6rem; letter-spacing:.15em; text-transform:uppercase;
  color:var(--ink); text-decoration:none; cursor:none;
  transition:color .2s; font-family:'Helvetica Neue',Helvetica,sans-serif; font-weight:700;
}
nav a:hover, nav a.active{ color:var(--acc); }

/* ── MULTI-STRIP WIPE ── */
#wipe{ position:fixed; inset:0; z-index:400; pointer-events:none; display:flex; flex-direction:column; }
#wipe.in{ pointer-events:all; }
.wipe-strip{ flex:1; background-color:#0528F2; transform:scaleX(0); will-change:transform; position:relative; overflow:hidden; }
#wipe.in .wipe-strip{ animation:stripIn 0.42s var(--ease) forwards; }
#wipe.out .wipe-strip{ animation:stripOut 0.38s var(--ease) forwards; }
@keyframes stripIn{ from{transform:scaleX(0);} to{transform:scaleX(1);} }
@keyframes stripOut{ from{transform:scaleX(1);} to{transform:scaleX(0);} }

/* ── APP SYSTEM ── */
#app{ position:fixed; inset:0; top:52px; }
.page{ position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; opacity:0; pointer-events:none; visibility:hidden; transition:opacity .05s; }
.page.active{ opacity:1; pointer-events:all; visibility:visible; }

/* TOP PAGE */
.top-hero{ position:relative; height:calc(100vh - 104px); background:#ddd9d2; display:flex; align-items:center; justify-content:center; }
.th-cta{ font-size:.78rem; letter-spacing:.22em; text-transform:uppercase; font-weight:700; cursor:none; background:none; border:none; }

.rv{ opacity:0; transform:translateY(14px); transition:opacity .75s var(--ease), transform .75s var(--ease); }
.rv.in{ opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div id="cur">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <polygon points="12,2 14.9,9.1 22.5,9.5 16.8,14.5 18.8,22 12,17.8 5.2,22 7.2,14.5 1.5,9.5 9.1,9.1"/>
  </svg>
</div>
<div id="ring"></div>

<div id="wipe">
  <div class="wipe-strip" data-i="0"></div>
  <div class="wipe-strip" data-i="1"></div>
  <div class="wipe-strip" data-i="2"></div>
  <div class="wipe-strip" data-i="3"></div>
  <div class="wipe-strip" data-i="4"></div>
</div>

<header>
  <span class="logo" onclick="goTo('top')">YUMIKA</span>
  <nav>
    <a onclick="goTo('works')" data-p="works">Work</a>
    <a onclick="goTo('about')" data-p="about">About</a>
    <a onclick="goTo('contact')" data-p="contact">Contact</a>
  </nav>
</header>

<div id="app">
  <div class="page active" id="page-top">
    <div class="top-hero">
      <button class="th-cta rv" onclick="goTo('works')">View Work</button>
    </div>
  </div>
  <div class="page" id="page-works" style="padding:100px;"><h1>WORKS PAGE</h1></div>
  <div class="page" id="page-about" style="padding:100px;"><h1>ABOUT PAGE</h1></div>
  <div class="page" id="page-contact" style="padding:100px;"><h1>CONTACT PAGE</h1></div>
</div>

<script>
// ── CURSOR SCRIPT (完全復活版) ──
var cur=document.getElementById('cur'), ring=document.getElementById('ring');
var mx=0, my=0, rx=0, ry=0;

document.addEventListener('mousemove', function(e){
  mx = e.clientX;
  my = e.clientY;
  cur.style.left = mx + 'px';
  cur.style.top = my + 'px';
});

// リングの追従アニメーション
(function updateRing(){
  rx += (mx - rx) * 0.15;
  ry += (my - ry) * 0.15;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(updateRing);
})();

// ホバー時のクラス切り替え
function addCH(selector){
  document.querySelectorAll(selector).forEach(function(el){
    el.addEventListener('mouseenter', function(){ document.body.classList.add('ch'); });
    el.addEventListener('mouseleave', function(){ document.body.classList.remove('ch'); });
  });
}
addCH('a, button, .logo');

// ── NAVIGATION ──
var current='top';
function goTo(p){
  if(p===current) return;
  var wipe=document.getElementById('wipe');
  wipe.classList.add('in');
  setTimeout(function(){
    document.getElementById('page-'+current).classList.remove('active');
    document.getElementById('page-'+p).classList.add('active');
    current=p;
    triggerReveal(document.getElementById('page-'+p));
    wipe.classList.remove('in');
    wipe.classList.add('out');
    setTimeout(function(){ wipe.classList.remove('out'); }, 600);
  }, 600);
}

function triggerReveal(container){
  container.querySelectorAll('.rv').forEach(function(el){
    el.classList.remove('in'); void el.offsetWidth;
    setTimeout(function(){el.classList.add('in');},10);
  });
}
setTimeout(function(){ triggerReveal(document.getElementById('page-top')); }, 100);
</script>
</body>
</html>
