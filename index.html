<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YUMIKA — Visual Artist / Experience Designer</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* --- 全体リセット --- */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#ffffff; --bg2:#f5f5f3; --ink:#111110; --mid:#888884;
  --faint:#c8c8c4; --line:transparent; --acc:#0528F2;
  --acc-light:rgba(5,40,242,.08); --dur:0.65s; --ease:cubic-bezier(0.76,0,0.24,1);
}

html{font-size:16px;}
body{
  font-family:'Helvetica Neue',Helvetica,'M PLUS 1p',sans-serif;
  background:var(--bg); color:var(--ink); font-weight:300;
  -webkit-font-smoothing:antialiased; cursor:none; overflow-x:hidden; height:100vh;
}

/* --- HEADER 修正の核心 --- */
header {
  position: fixed; top: 0; left: 0; 
  width: 100vw; /* 画面幅いっぱいに広げる */
  z-index: 200;
  background: var(--bg);
  height: 52px;
  padding: 0 2.5rem;
  display: flex; /* Flexboxを有効化 */
  align-items: center; /* 垂直方向の中央 */
}

.logo {
  font-family: 'Helvetica Neue', Helvetica, sans-serif;
  font-size: .65rem; letter-spacing: .28em; text-transform: uppercase;
  color: var(--ink); text-decoration: none; cursor: none; font-weight: 700;
  flex-shrink: 0;
  /* margin-right: auto はロゴの右側を最大に空けます */
  margin-right: auto !important; 
}

nav {
  display: flex !important; /* 強制的に横並びを維持 */
  gap: 2.2rem;
  align-items: center;
  flex-shrink: 0;
}

nav a {
  font-size: .6rem; letter-spacing: .15em; text-transform: uppercase;
  color: var(--ink); text-decoration: none; cursor: none;
  transition: color .2s; font-family: 'Helvetica Neue', Helvetica, sans-serif;
  font-weight: 700;
}
nav a:hover, nav a.active { color: var(--acc); }

/* --- ページ遷移（ワイプ） --- */
#wipe{ position:fixed; inset:0; z-index:400; pointer-events:none; display:flex; flex-direction:column; }
#wipe.in { pointer-events:all; }
.wipe-strip{ flex:1; background-color: #0528F2; transform:scaleX(0); will-change:transform; position:relative; overflow:hidden; }
#wipe-canvas{ position:absolute; inset:0; pointer-events:none; z-index:1; }
.wipe-strip[data-i="0"], .wipe-strip[data-i="2"], .wipe-strip[data-i="4"] { transform-origin:left; }
.wipe-strip[data-i="1"], .wipe-strip[data-i="3"] { transform-origin:right; }
#wipe.in .wipe-strip { animation: stripIn 0.42s var(--ease) forwards; }
@keyframes stripIn { from{ transform:scaleX(0); } to { transform:scaleX(1); } }
@keyframes stripOut { from{ transform:scaleX(1); } to { transform:scaleX(0); } }
#wipe.out .wipe-strip { animation: stripOut 0.38s var(--ease) forwards; }

/* --- アプリケーション --- */
#app{ position:fixed; inset:0; top:52px; }
.page{ position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; opacity:0; pointer-events:none; visibility:hidden; transition:opacity .05s; }
.page.active{ opacity:1; pointer-events:all; visibility:visible; }

/* ページ内コンテンツ (TOP) */
#page-top { display:flex; flex-direction:column; min-height:calc(100vh - 52px); }
.top-hero { position:relative; flex:1; background:#ddd9d2; display:flex; align-items:center; justify-content:center; }
.top-hero-text .th-cta { font-size:.78rem; letter-spacing:.22em; text-transform:uppercase; font-weight:700; border:none; background:none; cursor:none; }

/* レスポンシブ */
@media(max-width:480px){
  header { padding: 0 1.2rem; }
  nav { gap: 1rem; }
}
</style>
</head>
<body>

<header>
  <span class="logo" onclick="goTo('top')">YUMIKA</span>
  <nav>
    <a onclick="goTo('works')" data-p="works">Work</a>
    <a onclick="goTo('about')" data-p="about">About</a>
    <a onclick="goTo('contact')" data-p="contact">Contact</a>
  </nav>
</header>

<div id="app">
  <div class="page active" id="page-top">
    <div class="top-hero">
      <div class="top-hero-text">
        <button class="th-cta" onclick="goTo('works')">View Work</button>
      </div>
    </div>
  </div>
  <div class="page" id="page-works" style="padding: 100px; text-align: center;"><h1>WORKS PAGE</h1></div>
  <div class="page" id="page-about" style="padding: 100px; text-align: center;"><h1>ABOUT PAGE</h1></div>
  <div class="page" id="page-contact" style="padding: 100px; text-align: center;"><h1>CONTACT PAGE</h1></div>
</div>

<div id="wipe">
  <div class="wipe-strip" data-i="0"></div><div class="wipe-strip" data-i="1"></div>
  <div class="wipe-strip" data-i="2"></div><div class="wipe-strip" data-i="3"></div>
  <div class="wipe-strip" data-i="4"></div>
</div>

<script>
var current='top';
function goTo(p){
  if(p===current)return;
  var wipe=document.getElementById('wipe');
  wipe.classList.add('in');
  setTimeout(function(){
    document.getElementById('page-'+current).classList.remove('active');
    document.getElementById('page-'+p).classList.add('active');
    current=p;
    wipe.classList.remove('in');
    wipe.classList.add('out');
    setTimeout(function(){ wipe.classList.remove('out'); }, 500);
  }, 500);
}
</script>
</body>
</html>
